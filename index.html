<!DOCTYPE html>
<html>
<head>
<title>Kaze Key</title>

<script>

let sessionToken="";

async function loadKey(){

  try{

    let t = await fetch("https://codm-injector-panel.onrender.com/session");
    sessionToken = await t.text();

    if(
      !sessionToken ||
      sessionToken.includes("Please") ||
      sessionToken.includes("Access") ||
      sessionToken.includes("wait")
    ){
      document.getElementById("key").innerText = sessionToken;
      return;
    }

    let k = await fetch(
      "https://codm-injector-panel.onrender.com/getkey?token="+sessionToken
    );

    let key = await k.text();

    if(!key || key.includes("Access") || key.includes("Token")){
      document.getElementById("key").innerText = key;
      return;
    }

    key = key.replace("YOUR KEY:","").trim();

    document.getElementById("key").innerText = key;

  }

  catch(err){

    document.getElementById("key").innerText = "Server error. Try again.";

  }

}


function copyKey(){

  let key=document.getElementById("key").innerText;

  if(!key || key==="Loading key..." || key.includes("Please")){
    alert("No valid key to copy");
    return;
  }

  navigator.clipboard.writeText(key);
  alert("Key copied!");

}

window.onload=loadKey;

</script>

</head>

<body style="
text-align:center;
font-family:sans-serif;
margin-top:100px;
background:#0b0f16;
color:white;
">

<h2>KAZE LICENSE KEY</h2>

<div id="key" style="font-size:24px;font-weight:bold;">
Loading key...
</div>

<br><br>

<button onclick="copyKey()" style="
padding:12px 35px;
font-size:18px;
border-radius:6px;
border:none;
background:#2c7cff;
color:white;
">
COPY KEY
</button>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Kaze Key</title>

<script>

// ======================
// BLOCK DIRECT OPEN
// ======================
let ref = document.referrer;

if(!ref.includes("work.ink")){
document.write("Access denied please go to main link");
throw new Error("blocked");
}


// ======================
// ANTI REFRESH
// ======================
if(sessionStorage.getItem("key_used")){
document.write("Key already generated. Please go back to main link.");
throw new Error("already used");
}


// ======================
// LOAD KEY
// ======================
async function loadKey(){

  try{

    let t = await fetch("https://codm-injector-panel.onrender.com/token");
    let token = await t.text();

    if(token.includes("denied") || token.includes("wait")){
      document.getElementById("key").innerText = token;
      return;
    }

    let k = await fetch("https://codm-injector-panel.onrender.com/getkey?token="+token);
    let key = await k.text();

    if(key.includes("Access denied") || key.includes("expired")){
      document.getElementById("key").innerText = key;
      return;
    }

    sessionStorage.setItem("key_used","true");

    document.getElementById("key").innerText = key.replace("YOUR KEY:","");

  }
  catch{
    document.getElementById("key").innerText="ERROR LOADING KEY";
  }

}


// ======================
// COPY KEY
// ======================
function copyKey(){

  var key = document.getElementById("key").innerText;

  navigator.clipboard.writeText(key);

  alert("Key copied");

  window.location.href="https://www.google.com";

}


// ======================
window.onload = loadKey;
// ======================

</script>

</head>

<body style="text-align:center;font-family:sans-serif;margin-top:100px;background:#0b0f16;color:white;">

<h2>KAZE LICENSE KEY</h2>

<div id="key" style="font-size:24px;font-weight:bold;">
Loading key...
</div>

<br><br>

<button onclick="copyKey()" style="padding:12px 35px;font-size:18px;background:#00ffd5;border:none;border-radius:10px;">
COPY KEY
</button>

</body>
</html>

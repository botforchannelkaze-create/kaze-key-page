<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kaze Key System</title>
<style>
body {
    background:#0b0f16;
    color:white;
    font-family:sans-serif;
    text-align:center;
    margin-top:100px;
}
h2 { font-size:32px; letter-spacing:1px; }
#key { font-size:26px; font-weight:bold; margin-top:40px; }
button {
    padding:16px 50px;
    font-size:20px;
    background:#00ffd5;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:#000;
    font-weight:bold;
    box-shadow:0 0 15px rgba(0,255,213,0.5);
    transition:0.2s;
}
button:hover { transform:scale(1.05); }
#timer { margin-top:20px; font-size:18px; color:#ff5555; }
</style>
</head>
<body>

<h2>KAZE LICENSE KEY</h2>

<div id="key">Loading key...</div>
<div id="timer"></div>
<br>
<button onclick="copyKey()">COPY KEY</button>

<script>
// ======================
// REFERRER CHECK
// ======================
if(!document.referrer.includes("work.ink")){
    document.getElementById("key").innerText = "Access denied, go to main link";
    throw new Error("blocked");
}

// ======================
// COOLDOWN TIMER VARIABLES
// ======================
let cooldownSeconds = 0;

// ======================
// LOAD KEY FUNCTION
// ======================
async function loadKey(){
    try{
        // check if still in cooldown
        if(cooldownSeconds > 0){
            document.getElementById("timer").innerText = 
                `Please wait ${cooldownSeconds}s before getting a new key`;
            return;
        }

        document.getElementById("key").innerText = "Loading key...";

        // GET TOKEN
        let tokenRes = await fetch("https://codm-injector-panel.onrender.com/token");
        let token = await tokenRes.text();

        if(token.includes("Access denied") || token.includes("Cooldown")){
            document.getElementById("key").innerText = token;
            return;
        }

        // GET KEY
        let keyRes = await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${token}`);
        let data = await keyRes.json();

        if(data.status !== "success"){
            document.getElementById("key").innerText = data.message;
            return;
        }

        // show key
        document.getElementById("key").innerText = data.key;

        // start cooldown (KEY_LIMIT)
        cooldownSeconds = 60; // 60 sec before next key
        startCooldownTimer();

    }catch(err){
        console.log(err);
        document.getElementById("key").innerText = "SERVER ERROR";
    }
}

// ======================
// COOLDOWN TIMER
// ======================
function startCooldownTimer(){
    let timerEl = document.getElementById("timer");
    timerEl.innerText = `Please wait ${cooldownSeconds}s before getting a new key`;
    let interval = setInterval(() => {
        cooldownSeconds--;
        if(cooldownSeconds <= 0){
            clearInterval(interval);
            timerEl.innerText = "";
            cooldownSeconds = 0;
        } else {
            timerEl.innerText = `Please wait ${cooldownSeconds}s before getting a new key`;
        }
    }, 1000);
}

// ======================
// COPY KEY FUNCTION
// ======================
function copyKey(){
    let key = document.getElementById("key").innerText;
    navigator.clipboard.writeText(key);
    alert("Key copied!");
}

// ======================
// PREVENT BACK BUTTON
// ======================
history.pushState(null,null,location.href);
window.onpopstate = function(){ history.go(1); }

// ======================
// LOAD KEY ON PAGE LOAD
// ======================
window.onload = loadKey;
</script>

</body>
</html>

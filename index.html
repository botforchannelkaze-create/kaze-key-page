<script>

/* ======================
PARAM CHECK
====================== */

let params=new URLSearchParams(window.location.search);
let pass=params.get("pass");
let step=params.get("step");

if(pass!=="1"||step!=="gplinks"){
location.replace("https://kazehayamodz-main-page.onrender.com");
}

/* ======================
REFRESH BLOCK
====================== */

if(performance.navigation.type===1){
location.replace("https://kazehayamodz-main-page.onrender.com");
}

/* ======================
REFERRER CHECK
====================== */

let ref=document.referrer.toLowerCase();

if(
!ref.includes("kazehayamodz-main-page.onrender.com") &&
!ref.includes("gplinks")
){
location.replace("https://kazehayamodz-main-page.onrender.com");
}

/* ======================
KEY SYSTEM
====================== */

let cooldownSeconds=600;

async function loadKey(){

try{

document.getElementById("key").innerText="Generating key...";

/* GET TOKEN */

let tokenResponse=await fetch("https://codm-injector-panel.onrender.com/token",{cache:"no-store"});
let token=await tokenResponse.text();

/* CHECK TOKEN */

if(!token || token.includes("Cooldown") || token.includes("Wait")){
document.getElementById("key").innerText=token;
return;
}

/* GET KEY */

let keyResponse=await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${token}&src=site`,{cache:"no-store"});
let data=await keyResponse.json();

/* RESULT */

if(data.status==="success"){

document.getElementById("key").innerText=data.key;

startCooldown();

}else{

document.getElementById("key").innerText=data.message || "Key generation failed";

}

}catch(e){

document.getElementById("key").innerText="Server busy. Please try again.";

}

}

function startCooldown(){

let timer=document.getElementById("timer");

let interval=setInterval(()=>{

cooldownSeconds--;

if(cooldownSeconds<=0){

clearInterval(interval);

timer.innerText="Please go to the main link to generate again";

}else{

timer.innerText="Thanks! You can generate again later.";

}

},1000);

}

function copyKey(){

let key=document.getElementById("key").innerText;

navigator.clipboard.writeText(key);

location.replace("https://kazehayamodz-main-page.onrender.com");

}

/* ======================
BACK BUTTON BLOCK
====================== */

history.pushState(null,null,location.href);

window.onpopstate=function(){
history.go(1);
};

/* ====================== */

window.onload=loadKey;

  </script>

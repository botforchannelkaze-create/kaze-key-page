<!DOCTYPE html>
<html>
<head>
    <title>Kaze Key</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        async function generateKey() {
            const keyElement = document.getElementById("key");
            const btn = document.getElementById("genBtn");
            
            keyElement.innerText = "Generating...";
            keyElement.style.color = "#00ff00";
            btn.disabled = true;

            try {
                // STEP 1: Kumuha ng Token (Dapat may /token sa dulo)
                let t = await fetch("https://codm-injector-panel.onrender.com/token");
                
                if (!t.ok) {
                    let errText = await t.text();
                    keyElement.innerText = errText || "Access Denied";
                    keyElement.style.color = "red";
                    btn.disabled = false;
                    return;
                }
                
                let sessionToken = await t.text();

                // STEP 2: Gamitin ang token para sa Key
                let k = await fetch("https://codm-injector-panel.onrender.com/getkey?token=" + sessionToken);
                let response = await k.json();

                if (response.status === "success") {
                    keyElement.innerText = response.key;
                    btn.style.display = "none"; 
                    document.getElementById("copyBtn").style.display = "inline-block";
                } else {
                    keyElement.innerText = response.message || "Invalid Session";
                    keyElement.style.color = "red";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                keyElement.innerText = "Server error. Refresh page.";
                keyElement.style.color = "red";
                btn.disabled = false;
            }
        }

        function copyKey() {
            let key = document.getElementById("key").innerText;
            navigator.clipboard.writeText(key);
            alert("Key copied!");
        }
    </script>
</head>

<body style="text-align:center; font-family:sans-serif; margin-top:100px; background:#0b0f16; color:white;">

    <h2>KAZE LICENSE KEY</h2>

    <div id="key" style="font-size:24px; font-weight:bold; margin-bottom: 20px; color: #00ff00; padding: 0 20px;">
        Click the button to get your key
    </div>

    <button id="genBtn" onclick="generateKey()" style="padding:12px 35px; font-size:18px; border-radius:6px; border:none; background:#2c7cff; color:white; cursor:pointer;">
        GENERATE KEY
    </button>

    <button id="copyBtn" onclick="copyKey()" style="display:none; padding:12px 35px; font-size:18px; border-radius:6px; border:none; background:#28a745; color:white; cursor:pointer;">
        COPY KEY
    </button>

    <p style="font-size: 12px; color: #888; margin-top: 30px;">
        Note: Key is valid for 24 hours only.
    </p>

</body>
</html>

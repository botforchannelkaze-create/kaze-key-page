<!DOCTYPE html>
<html>
<head>
    <title>Kaze Key System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        async function generateKey() {
            const keyElement = document.getElementById("key");
            const btn = document.getElementById("genBtn");
            
            // Kukunin ang 'source' mula sa browser URL
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('source') || "";

            keyElement.innerText = "Generating...";
            btn.disabled = true;

            try {
                // Ipapasa ang source tag sa Flask
                let t = await fetch(`https://codm-injector-panel.onrender.com/token?source=${source}`);
                
                if (!t.ok) {
                    keyElement.innerText = await t.text();
                    keyElement.style.color = "red";
                    btn.disabled = false;
                    return;
                }
                
                let sessionToken = await t.text();
                let k = await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${sessionToken}`);
                let response = await k.json();

                if (response.status === "success") {
                    keyElement.innerText = response.key;
                    keyElement.style.color = "#00ff00";
                    btn.style.display = "none"; 
                    document.getElementById("copyBtn").style.display = "inline-block";
                } else {
                    keyElement.innerText = response.message;
                    btn.disabled = false;
                }
            } catch (err) {
                keyElement.innerText = "Server error. Try again.";
                btn.disabled = false;
            }
        }

        function copyKey() {
            navigator.clipboard.writeText(document.getElementById("key").innerText);
            alert("Key copied!");
        }
    </script>
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:100px; background:#0b0f16; color:white;">
    <h2>KAZE LICENSE KEY</h2>
    <div id="key" style="font-size:24px; font-weight:bold; margin-bottom: 20px;">Ready to generate?</div>
    <button id="genBtn" onclick="generateKey()" style="padding:12px 35px; background:#2c7cff; color:white; border:none; border-radius:6px; cursor:pointer;">GENERATE KEY</button>
    <button id="copyBtn" onclick="copyKey()" style="display:none; padding:12px 35px; background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer;">COPY KEY</button>
</body>
</html>

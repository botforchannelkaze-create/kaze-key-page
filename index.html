<!DOCTYPE html>
<html>
<head>
<title>Kaze Key</title>
<script>
let sessionToken = "";

async function loadKey() {
  try {
    // STEP 1: Get session token first
    let t = await fetch("https://codm-injector-panel.onrender.com/session");
    sessionToken = await t.text();

    if(sessionToken.includes("Access denied") || sessionToken.includes("Wait")) {
      document.getElementById("key").innerText = sessionToken;
      return;
    }

    // STEP 2: Use session token to get key
    let k = await fetch("https://codm-injector-panel.onrender.com/getkey?token="+sessionToken);
    let key = await k.text();

    document.getElementById("key").innerText = key.replace("YOUR KEY:", "");

  } catch(err) {
    document.getElementById("key").innerText = "ERROR LOADING KEY";
    console.error(err);
  }
}

function copyKey(){
  let key = document.getElementById("key").innerText;
  if(!key || key === "Loading key..." || key.includes("Access denied")) {
    alert("No valid key to copy");
    return;
  }

  navigator.clipboard.writeText(key);
  alert("Key copied!");
}

window.onload = loadKey;
</script>
</head>
<body style="text-align:center;font-family:sans-serif;margin-top:100px;background:#0b0f16;color:white;">
<h2>KAZE LICENSE KEY</h2>
<div id="key" style="font-size:24px;font-weight:bold;">Loading key...</div>
<br><br>
<button onclick="copyKey()" style="padding:12px 35px;font-size:18px;">COPY KEY</button>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KAZE SECURE KEY SYSTEM</title>

<style>

body{
background:#0b0f16;
color:white;
font-family:sans-serif;
text-align:center;
margin-top:80px;
}

/* TITLE */

h2{
font-size:48px;
letter-spacing:1px;
margin-bottom:20px;
}

/* KEY BOX */

#key{
font-size:36px;
font-weight:bold;
margin-top:50px;
padding:30px 40px;
border-radius:20px;
border:4px solid #00ffd5;
display:inline-block;
min-width:350px;
background:#0f1624;
box-shadow:0 0 25px rgba(0,255,213,0.6);
}

/* TIMER */

#timer{
margin-top:25px;
font-size:22px;
color:#ff5555;
}

/* COPY BUTTON */

button{
margin-top:50px;
padding:24px 100px;
font-size:28px;
font-weight:bold;
border:none;
border-radius:20px;
cursor:pointer;
color:white;
position:relative;
overflow:hidden;
transition:0.2s;
}

/* RAINBOW BUTTON */

button::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
45deg,
red,
orange,
yellow,
lime,
cyan,
blue,
violet,
red
);
background-size:400%;
animation:rainbow 6s linear infinite;
z-index:0;
border-radius:20px;
}

button span{
position:relative;
z-index:1;
}

@keyframes rainbow{
0%{background-position:0%}
100%{background-position:400%}
}

button:hover{
transform:scale(1.08);
}

/* INFO */

#info{
margin-top:40px;
font-size:18px;
color:#aaa;
line-height:1.5;
}

</style>
</head>

<body>

<h2>KAZEHAYAMODZ FREE KEY CODM INJECTOR</h2>

<div id="key">Loading key...</div>

<div id="timer"></div>

<br>

<button onclick="copyKey()">
<span>🔑 COPY KEY</span>
</button>

<div id="info">
Default 12 hours key | You can get a key if your key expired
</div>

<script>

// ======================
// CHECK GPLINKS PARAMS
// ======================

let params = new URLSearchParams(window.location.search);
let pass = params.get("pass");
let step = params.get("step");

if(pass !== "1" || step !== "gplinks"){
    window.location.replace("https://kazehayamodz-main-page.onrender.com");
}


// ======================
// BLOCK REFRESH ONLY
// ======================

if (performance.navigation.type === 1) {
    window.location.replace("https://kazehayamodz-main-page.onrender.com");
}


// ======================
// COOLDOWN
// ======================

let cooldownSeconds = 60;


// ======================
// LOAD KEY
// ======================

async function loadKey(){

try{

document.getElementById("key").innerText="Loading key...";

let tokenRes = await fetch("https://codm-injector-panel.onrender.com/token");
let token = await tokenRes.text();

let keyRes = await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${token}`);
let data = await keyRes.json();

if(data.status !== "success"){
document.getElementById("key").innerText=data.message;
return;
}

document.getElementById("key").innerText=data.key;

startCooldown();

}
catch(e){

document.getElementById("key").innerText="SERVER ERROR";

}

}


// ======================
// TIMER
// ======================

function startCooldown(){

let timer=document.getElementById("timer");

let interval=setInterval(()=>{

cooldownSeconds--;

if(cooldownSeconds<=0){

clearInterval(interval);

timer.innerText="Please go to the main link to generate again";

}
else{

timer.innerText=`Please wait ${cooldownSeconds}s before generate again key`;

}

},1000);

}


// ======================
// COPY KEY
// ======================

function copyKey(){

let key=document.getElementById("key").innerText;

navigator.clipboard.writeText(key);

window.location.replace("https://kazehayamodz-main-page.onrender.com");

}


// ======================
// BLOCK BACK BUTTON
// ======================

history.pushState(null,null,location.href);

window.onpopstate=function(){
history.go(1);
}


// ======================
// LOAD KEY
// ======================

window.onload=loadKey;

</script>
</body>
</html>

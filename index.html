<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kaze Key System</title>
<style>
body {background:#0b0f16;color:white;font-family:sans-serif;text-align:center;margin-top:120px;}
h2 {font-size:34px;margin-bottom:30px;letter-spacing:2px;}
#key {font-size:28px;font-weight:bold;margin-top:40px;background:#111827;padding:20px;border-radius:12px;min-width:300px;display:inline-block;box-shadow:0 0 20px rgba(0,255,213,0.2);}
button {padding:18px 60px;font-size:20px;border:none;border-radius:14px;cursor:pointer;margin:10px;transition:0.2s;}
.copybtn {background:#00ffd5;color:#000;font-weight:bold;box-shadow:0 0 15px rgba(0,255,213,0.5);}
.copybtn:hover {transform:scale(1.05);}
.loading {animation:blink 1s infinite;}
@keyframes blink {0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1}}
</style>
<script>
// BLOCK DIRECT OPEN
if(!document.referrer.includes("work.ink")){document.write("Access denied please go to main link");throw new Error("blocked");}
// BLOCK BACK / REFRESH
if(localStorage.getItem("key_generated")){document.write("Access denied please go to main link");throw new Error("already used");}

// LOAD KEY
async function loadKey(){
    const keyBox = document.getElementById("key");
    keyBox.innerText = "Loading key...";
    keyBox.classList.add("loading");
    try{
        let tokenRequest = await fetch("https://codm-injector-panel.onrender.com/token");
        let token = await tokenRequest.text();
        if(token.includes("Access denied") || token.includes("Cooldown")){keyBox.innerText = token;keyBox.classList.remove("loading");return;}
        let keyRequest = await fetch("https://codm-injector-panel.onrender.com/getkey?token=" + token);
        let data = await keyRequest.json();
        if(data.status !== "success"){keyBox.innerText = data.message;keyBox.classList.remove("loading");return;}
        localStorage.setItem("key_generated","true");
        keyBox.innerText = data.key;
        keyBox.classList.remove("loading");
    }catch(e){keyBox.innerText="SERVER ERROR";keyBox.classList.remove("loading");}
}

// COPY KEY
function copyKey(){
    let key = document.getElementById("key").innerText;
    navigator.clipboard.writeText(key);
    alert("Key copied!");
    window.location.href="https://google.com";
}

// PREVENT BACK BUTTON
history.pushState(null,null,location.href);
window.onpopstate=function(){history.go(1);};

window.onload = loadKey;
</script>
</head>
<body>
<h2>KAZE LICENSE KEY</h2>
<div id="key" class="loading">Loading key...</div>
<br><br>
<button onclick="copyKey()" class="copybtn">COPY KEY</button>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kaze Key System</title>

<script>

// ======================
// BLOCK DIRECT OPEN
// ======================
let ref = document.referrer;

if(!ref.includes("work.ink")){
document.write("Access denied please go to main link");
throw new Error("blocked");
}


// ======================
// BLOCK BACK / REFRESH
// ======================
if(localStorage.getItem("key_generated")){
document.write("Access denied please go to main link");
throw new Error("already used");
}


// ======================
// LOAD KEY
// ======================
async function loadKey(){

try{

// get token
let tokenRequest = await fetch("https://codm-injector-panel.onrender.com/token");
let token = await tokenRequest.text();

// show server block message
if(token.includes("Access denied") || token.includes("Cooldown")){
document.getElementById("key").innerText = token;
return;
}


// get key
let keyRequest = await fetch("https://codm-injector-panel.onrender.com/getkey?token="+token);
let data = await keyRequest.json();


if(data.status !== "success"){
document.getElementById("key").innerText = data.message;
return;
}


// save usage so refresh/back can't generate again
localStorage.setItem("key_generated","true");

document.getElementById("key").innerText = data.key;

}
catch(e){

document.getElementById("key").innerText = "SERVER ERROR";

}

}


// ======================
// COPY KEY
// ======================
function copyKey(){

let key = document.getElementById("key").innerText;

navigator.clipboard.writeText(key);

alert("Key copied!");

// redirect after copy
window.location.href = "https://google.com";

}


// ======================
// PREVENT BACK BUTTON
// ======================
history.pushState(null,null,location.href);
window.onpopstate=function(){
history.go(1);
};


// ======================
window.onload = loadKey;
// ======================

</script>

</head>


<body style="background:#0b0f16;color:white;font-family:sans-serif;text-align:center;margin-top:120px;">


<h2>KAZE LICENSE KEY</h2>

<div id="key" style="font-size:26px;font-weight:bold;margin-top:40px;">
Loading key...
</div>


<br><br>


<button onclick="copyKey()" style="
padding:14px 40px;
font-size:18px;
background:#00ffd5;
border:none;
border-radius:12px;
cursor:pointer;
">

COPY KEY

</button>


</body>
</html>

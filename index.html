<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KAZE SECURE KEY SYSTEM</title>

<style>
body {
    background: #0b0f16;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    margin-top: 80px;
}

/* TITLE */
h2 {
    font-size: 42px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}

/* KEY BOX */
#key {
    font-size: 36px;
    font-weight: bold;
    margin-top: 50px;
    padding: 30px 40px;
    border-radius: 20px;
    border: 4px solid #00ffd5;
    display: inline-block;
    min-width: 350px;
    background: #0f1624;
    box-shadow: 0 0 30px rgba(0, 255, 213, 0.4);
    transition: 0.3s;
}

/* TIMER */
#timer {
    margin-top: 25px;
    font-size: 24px;
    color: #ff4444;
    font-weight: bold;
    text-transform: uppercase;
}

/* LARGE RED ROTATING BUTTON */
button {
    margin-top: 60px;
    padding: 35px 120px; /* Mas malaki na ito */
    font-size: 32px;
    font-weight: 900;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    color: white;
    position: relative;
    background: #111; /* Dark base */
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

/* ANG PAIKOT NA RED LIGHT */
button::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: conic-gradient(
        transparent, 
        transparent, 
        transparent, 
        #ff0000 /* Ang kulay red */
    );
    animation: rotate 1.5s linear infinite;
    z-index: 0;
}

/* INNER LAYER PARA MAGMUKHANG BORDER YUNG RED */
button::after {
    content: "";
    position: absolute;
    inset: 4px; /* Kapal ng border */
    background: #111;
    border-radius: 21px;
    z-index: 0;
}

button span {
    position: relative;
    z-index: 1;
    text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
}

button:active {
    transform: scale(0.95);
}

/* INFO */
#info {
    margin-top: 50px;
    font-size: 18px;
    color: #888;
    line-height: 1.6;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>

<body>

<h2>KAZEHAYAMODZ FREE KEY CODM INJECTOR</h2>

<div id="key">Loading key...</div>

<div id="timer"></div>

<br>

<button onclick="copyKey()">
    <span>🔑 COPY KEY</span>
</button>

<div id="info">
    Default 12 hours key | You can get a key if your key expired
</div>

<script>
// ======================
// HINDI PINAKIALAMAN ANG LOGIC
// ======================

let params = new URLSearchParams(window.location.search);
let pass = params.get("pass");
let step = params.get("step");

if(pass !== "1" || step !== "gplinks"){
    window.location.replace("https://kazehayamodz-main-page.onrender.com");
}

if (performance.navigation.type === 1) {
    window.location.replace("https://kazehayamodz-main-page.onrender.com");
}

let cooldownSeconds = 60;

async function loadKey(){
try{
    document.getElementById("key").innerText="Loading key...";
    let tokenRes = await fetch("https://codm-injector-panel.onrender.com/token");
    let token = await tokenRes.text();
    let keyRes = await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${token}`);
    let data = await keyRes.json();
    if(data.status !== "success"){
        document.getElementById("key").innerText=data.message;
        return;
    }
    document.getElementById("key").innerText=data.key;
    startCooldown();
}
catch(e){
    document.getElementById("key").innerText="SERVER ERROR";
}
}

function startCooldown(){
    let timer=document.getElementById("timer");
    let interval=setInterval(()=>{
        cooldownSeconds--;
        if(cooldownSeconds<=0){
            clearInterval(interval);
            timer.innerText="Please go to the main link to generate again";
        }
        else{
            timer.innerText=`Please wait ${cooldownSeconds}s before generate again key`;
        }
    },1000);
}

function copyKey(){
    let key=document.getElementById("key").innerText;
    navigator.clipboard.writeText(key);
    window.location.replace("https://kazehayamodz-main-page.onrender.com");
}

history.pushState(null,null,location.href);
window.onpopstate=function(){
    history.go(1);
}

window.onload=loadKey;
</script>
</body>
</html>

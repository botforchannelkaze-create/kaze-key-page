<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kaze Key System</title>

<style>

body{
    background:#0b0f16;
    color:white;
    font-family:sans-serif;
    text-align:center;
    margin-top:100px;
}

/* TITLE */
h2{
    font-size:34px;
    letter-spacing:1px;
}

/* KEY BOX */
#key{
    font-size:24px;
    font-weight:bold;
    margin-top:40px;
    padding:18px;
    border-radius:12px;
    border:2px solid #00ffd5;
    display:inline-block;
    min-width:260px;
    background:#0f1624;
    box-shadow:0 0 15px rgba(0,255,213,0.3);
}

/* TIMER */
#timer{
    margin-top:20px;
    font-size:18px;
    color:#ff5555;
}

/* COPY BUTTON */
button{
    margin-top:30px;
    padding:18px 70px;
    font-size:22px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    position:relative;
    overflow:hidden;
    transition:0.2s;
}

/* RAINBOW ANIMATION */
button::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );
    background-size:400%;
    animation:rainbow 6s linear infinite;
    z-index:0;
}

button span{
    position:relative;
    z-index:1;
}

@keyframes rainbow{
    0%{background-position:0%}
    100%{background-position:400%}
}

button:hover{
    transform:scale(1.06);
}

</style>

</head>
<body>

<h2>KAZE LICENSE KEY</h2>

<div id="key">Loading key...</div>

<div id="timer"></div>

<br>

<button onclick="copyKey()">
<span>🔑 COPY KEY</span>
</button>

<script>
// ======================
// REQUIRE MAIN PAGE REFERRER
// ======================
let ref = document.referrer;
if(!ref.includes("kazehayamodz-main-page.onrender.com") &&
   !ref.includes("gplinks") &&
   !ref.includes("work.ink") &&
   !ref.includes("youtube") &&
   !ref.includes("tiktok.com") &&
   !ref.includes("shopee.ph")){
    window.location.href = "https://kazehayamodz-main-page.onrender.com";
}

// ======================
// PREVENT REFRESH SPAM
// ======================
if(sessionStorage.getItem("generated")){
    window.location.href = "https://kazehayamodz-main-page.onrender.com";
}

// ======================
// COOLDOWN VARIABLES
// ======================
let cooldownSeconds = 0;

// ======================
// LOAD KEY FUNCTION
// ======================
async function loadKey(){
    try{
        document.getElementById("key").innerText = "Loading key...";

        let tokenRes = await fetch("https://codm-injector-panel.onrender.com/token");
        let token = await tokenRes.text();

        if(token.includes("Wait") || token.includes("Cooldown")){
            document.getElementById("key").innerText = token;
            return;
        }

        let keyRes = await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${token}`);
        let data = await keyRes.json();

        if(data.status !== "success"){
            document.getElementById("key").innerText = data.message;
            return;
        }

        sessionStorage.setItem("generated","true");

        document.getElementById("key").innerText = data.key;

        cooldownSeconds = 60;
        startCooldownTimer();

    }catch(e){
        document.getElementById("key").innerText = "SERVER ERROR";
    }
}

// ======================
// COOLDOWN TIMER
// ======================
function startCooldownTimer(){
    let timerEl = document.getElementById("timer");
    timerEl.innerText = `Please wait ${cooldownSeconds}s before getting a new key`;

    let interval = setInterval(()=>{
        cooldownSeconds--;
        if(cooldownSeconds <= 0){
            clearInterval(interval);
            timerEl.innerText = "";
            cooldownSeconds = 0;
        } else {
            timerEl.innerText = `Please wait ${cooldownSeconds}s before getting a new key`;
        }
    }, 1000);
}

// BLOCK RETURN AFTER COPY
if(sessionStorage.getItem("key_done")){
window.location.replace("https://kazehayamodz-main-page.onrender.com");
}

// ======================
// COPY KEY FUNCTION
// ======================
function copyKey(){

let key = document.getElementById("key").innerText;

navigator.clipboard.writeText(key);

sessionStorage.setItem("key_done","true");

window.location.replace("https://kazehayamodz-main-page.onrender.com");

}

// ======================
// PREVENT BACK BUTTON
// ======================
history.pushState(null,null,location.href);
window.onpopstate = function(){ history.go(1); }

// ======================
// LOAD KEY ON PAGE LOAD
// ======================
window.onload = loadKey;

</script>

</body>
</html>

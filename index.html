<!DOCTYPE html>
<html>
<head>
<title>Kaze Key</title>

<script>

// ======================
// GET KEY FROM SERVER
// ======================
async function loadKey(){
  try{
    const res = await fetch("https://codm-injector-panel.onrender.com/getkey");
    const key = await res.text();
    document.getElementById("key").innerText = key.trim();
  }catch(e){
    document.getElementById("key").innerText = "ERROR LOADING KEY";
  }
}

// ======================
// COPY KEY
// ======================
function copyKey(){
  var key = document.getElementById("key").innerText;

  navigator.clipboard.writeText(key);

  alert("Key copied!");

  // redirect after copy
  window.location.href="https://www.google.com";
}

// ======================
// REDIRECT IF RELOAD
// ======================
window.onbeforeunload=function(){
  window.location.href="https://www.google.com";
}

// ======================
// LOAD KEY WHEN PAGE OPEN
// ======================
window.onload=loadKey;

</script>

</head>

<body style="text-align:center;font-family:sans-serif;margin-top:100px;background:#0b0f16;color:white;">

<h2>KAZE LICENSE KEY</h2>

<div id="key" style="font-size:24px;font-weight:bold;margin-top:20px;">
Loading key...
</div>

<br><br>

<button onclick="copyKey()" style="padding:12px 35px;font-size:18px;background:#00ffd5;border:none;border-radius:10px;">
COPY KEY
</button>

</body>
</html>

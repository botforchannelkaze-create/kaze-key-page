<!DOCTYPE html>
<html>
<head>
    <title>KAZE KEY SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        window.onload = async function() {
            const keyElement = document.getElementById("key");
            const urlParams = new URLSearchParams(window.location.search);
            const source = urlParams.get('source');

            // CLEANUP: Burahin ang ?source=workink sa URL bar para sa anti-refresh
            window.history.replaceState({}, document.title, window.location.pathname);

            if (!source || source !== "workink") {
                keyElement.innerText = "ACCESS DENIED: Please use the official link.";
                keyElement.style.color = "red";
                return;
            }

            keyElement.innerText = "Generating License...";
            
            try {
                let tReq = await fetch(`https://codm-injector-panel.onrender.com/token?source=workink`);
                if (!tReq.ok) {
                    keyElement.innerText = await tReq.text();
                    return;
                }
                let token = await tReq.text();

                let kReq = await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${token}`);
                let res = await kReq.json();

                if (res.status === "success") {
                    keyElement.innerText = res.key;
                    document.getElementById("copyBtn").style.display = "inline-block";
                } else {
                    keyElement.innerText = res.message;
                }
            } catch (err) {
                keyElement.innerText = "Server error. Try again later.";
            }
        };
    </script>
</head>
<body style="text-align:center; font-family:sans-serif; background:#0b0f16; color:white; padding-top:100px;">
    <h2>KAZE LICENSE GENERATOR</h2>
    <div id="key" style="font-size:22px; font-weight:bold; margin:20px; color:#00ff00; border:1px solid #333; padding:20px;">Initializing...</div>
    <button id="copyBtn" style="display:none; padding:10px 20px;" onclick="navigator.clipboard.writeText(document.getElementById('key').innerText); alert('Copied!')">COPY KEY</button>
</body>
</html>

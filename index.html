<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kaze Key System</title>

<style>
body{
    background:#0b0f16;
    color:white;
    font-family:sans-serif;
    text-align:center;
    margin-top:100px;
}

/* TITLE */
h2{
    font-size:40px;
    letter-spacing:1px;
}

/* KEY BOX */
#key{
    font-size:30px;
    font-weight:bold;
    margin-top:50px;
    padding:25px 30px;
    border-radius:16px;
    border:3px solid #00ffd5;
    display:inline-block;
    min-width:300px;
    background:#0f1624;
    box-shadow:0 0 20px rgba(0,255,213,0.5);
}

/* TIMER */
#timer{
    margin-top:25px;
    font-size:20px;
    color:#ff5555;
}

/* COPY BUTTON */
button{
    margin-top:40px;
    padding:22px 90px;
    font-size:26px;
    font-weight:bold;
    border:none;
    border-radius:18px;
    cursor:pointer;
    color:white;
    position:relative;
    overflow:hidden;
    transition:0.2s;
}

/* RAINBOW ANIMATION */
button::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );
    background-size:400%;
    animation:rainbow 6s linear infinite;
    z-index:0;
    border-radius:18px;
}

button span{
    position:relative;
    z-index:1;
}

@keyframes rainbow{
    0%{background-position:0%}
    100%{background-position:400%}
}

button:hover{
    transform:scale(1.08);
}

</style>
</head>
<body>

<h2>KAZE LICENSE KEY</h2>

<div id="key">Loading key...</div>

<div id="timer"></div>

<br>

<button onclick="copyKey()">
<span>🔑 COPY KEY</span>
</button>

<script>
// ======================
// BLOCK DIRECT ACCESS / REFRESH
// ======================
let ref = document.referrer;
if(
    (!sessionStorage.getItem("generated")) &&
    !ref.includes("kazehayamodz-main-page.onrender.com")
){
    window.location.href = "https://kazehayamodz-main-page.onrender.com";
}

// ======================
// BLOCK RETURN AFTER COPY
// ======================
if(sessionStorage.getItem("key_done")){
    window.location.replace("https://kazehayamodz-main-page.onrender.com");
}

// ======================
// COOLDOWN VARIABLES
// ======================
let cooldownSeconds = 0;

// ======================
// LOAD KEY FUNCTION
// ======================
async function loadKey(){
    try{
        document.getElementById("key").innerText = "Loading key...";

        let tokenRes = await fetch("https://codm-injector-panel.onrender.com/token");
        let token = await tokenRes.text();

        if(token.includes("Wait") || token.includes("Cooldown")){
            document.getElementById("key").innerText = token;
            return;
        }

        let keyRes = await fetch(`https://codm-injector-panel.onrender.com/getkey?token=${token}`);
        let data = await keyRes.json();

        if(data.status !== "success"){
            document.getElementById("key").innerText = data.message;
            return;
        }

        // MARK GENERATED
        sessionStorage.setItem("generated","true");
        document.getElementById("key").innerText = data.key;

        cooldownSeconds = 60;
        startCooldownTimer();

    }catch(e){
        document.getElementById("key").innerText = "SERVER ERROR";
    }
}

// ======================
// COOLDOWN TIMER
// ======================
function startCooldownTimer(){
    let timerEl = document.getElementById("timer");
    timerEl.innerText = `Please wait ${cooldownSeconds}s before getting a new key`;

    let interval = setInterval(()=>{
        cooldownSeconds--;
        if(cooldownSeconds <= 0){
            clearInterval(interval);
            timerEl.innerText = "";
            cooldownSeconds = 0;
        } else {
            timerEl.innerText = `Please wait ${cooldownSeconds}s before getting a new key`;
        }
    }, 1000);
}

// ======================
// COPY KEY FUNCTION
// ======================
function copyKey(){
    let key = document.getElementById("key").innerText;
    navigator.clipboard.writeText(key);
    sessionStorage.setItem("key_done","true");

    // DIRECT TO MAIN PAGE
    window.location.replace("https://kazehayamodz-main-page.onrender.com");
}

// ======================
// PREVENT BACK BUTTON
// ======================
history.pushState(null,null,location.href);
window.onpopstate = function(){ history.go(1); }

// ======================
// LOAD KEY ON PAGE LOAD
// ======================
window.onload = loadKey;

</script>

</body>
</html>
